<!DOCTYPE html>
<html>
<head>
<title>For My Mom ❤️</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
color:white;
overflow:hidden;
}

.container{
margin-top:120px;
padding:20px;
}

h1{
font-size:50px;
}

p{
font-size:22px;
max-width:600px;
margin:auto;
line-height:1.6;
}

button{
margin-top:30px;
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
background:white;
color:#ff5c8a;
cursor:pointer;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

button:hover{
transform:scale(1.1);
}

#message{
display:none;
margin-top:30px;
}

.heart{
position:fixed;
bottom:-20px;
font-size:22px;
animation:float 7s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

.footer{
position:fixed;
bottom:10px;
width:100%;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h1>I Love You Mom ❤️</h1>

<button onclick="showMessage()">Open Message 💌</button>

<div id="message">

<p>

Dear Mom ❤️  

Thank you for everything you have done for me.  
Your love, care and support mean the world to me.  

You are my first teacher, my guide, and my biggest strength.  

No matter how big I grow, I will always be your child.  

<strong>I love you so much Mom ❤️</strong>

</p>

</div>

</div>

<div class="footer">
Made with love by Sohum ❤️
</div>

<script>

function showMessage(){
document.getElementById("message").style.display="block";
}

setInterval(function(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(Math.random()*25+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},7000);

},250);

</script>

</body>
</html>
